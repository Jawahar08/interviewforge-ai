<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="fbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="fg">
      <feGaussianBlur stdDeviation="1.5"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="wave-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="20%" style="stop-color:#7b2ff7;stop-opacity:0.5">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#7b2ff7" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00d2ff;stop-opacity:0.3">
        <animate attributeName="stop-color" values="#00d2ff;#64ffda;#00d2ff" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="80%" style="stop-color:#64ffda;stop-opacity:0.5">
        <animate attributeName="stop-color" values="#64ffda;#7b2ff7;#64ffda" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes wave1 { 0%,100% { d: path('M0,140 Q150,120 300,130 T600,125 T900,140 L900,160 L0,160 Z'); } 50% { d: path('M0,135 Q150,145 300,125 T600,140 T900,130 L900,160 L0,160 Z'); } }
    @keyframes wave2 { 0%,100% { d: path('M0,145 Q200,130 400,140 T700,135 T900,145 L900,160 L0,160 Z'); } 50% { d: path('M0,140 Q200,150 400,130 T700,145 T900,135 L900,160 L0,160 Z'); } }
    @keyframes floatUp { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    @keyframes glowBorder { 0%,100% { stroke-opacity: 0.4; } 50% { stroke-opacity: 1; } }
    .feat-float { animation: floatUp 4s ease-in-out infinite; }
    .ff1 { animation-delay: 0s; }
    .ff2 { animation-delay: 0.4s; }
    .ff3 { animation-delay: 0.8s; }
    .ff4 { animation-delay: 1.2s; }
    .ff5 { animation-delay: 1.6s; }
    .ff6 { animation-delay: 2.0s; }
    .ff7 { animation-delay: 2.4s; }
    .ff8 { animation-delay: 2.8s; }
  </style>

  <rect width="900" height="160" fill="url(#fbg)" rx="12"/>

  <!-- Animated wave footer -->
  <path d="M0,140 Q150,120 300,130 T600,125 T900,140 L900,160 L0,160 Z" fill="url(#wave-grad)" opacity="0.15">
    <animate attributeName="d" values="M0,140 Q150,120 300,130 T600,125 T900,140 L900,160 L0,160 Z;M0,135 Q150,145 300,125 T600,140 T900,130 L900,160 L0,160 Z;M0,140 Q150,120 300,130 T600,125 T900,140 L900,160 L0,160 Z" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M0,145 Q200,130 400,140 T700,135 T900,145 L900,160 L0,160 Z" fill="url(#wave-grad)" opacity="0.1">
    <animate attributeName="d" values="M0,145 Q200,130 400,140 T700,135 T900,145 L900,160 L0,160 Z;M0,140 Q200,150 400,130 T700,145 T900,135 L900,160 L0,160 Z;M0,145 Q200,130 400,140 T700,135 T900,145 L900,160 L0,160 Z" dur="8s" repeatCount="indefinite"/>
  </path>

  <!-- Feature grid: 8 animated feature boxes -->
  <g class="feat-float ff1">
    <rect x="22" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#00d2ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="40" text-anchor="middle" font-size="16">🔐</text>
    <text x="70" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#00d2ff" font-weight="600">AUTH</text>
  </g>

  <g class="feat-float ff2">
    <rect x="130" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#7b2ff7" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="0.4s"/>
    </rect>
    <text x="178" y="40" text-anchor="middle" font-size="16">🎙️</text>
    <text x="178" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#7b2ff7" font-weight="600">INTERVIEW</text>
  </g>

  <g class="feat-float ff3">
    <rect x="238" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#64ffda" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="0.8s"/>
    </rect>
    <text x="286" y="40" text-anchor="middle" font-size="16">🧠</text>
    <text x="286" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64ffda" font-weight="600">AI ENGINE</text>
  </g>

  <g class="feat-float ff4">
    <rect x="346" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#ffd93d" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/>
    </rect>
    <text x="394" y="40" text-anchor="middle" font-size="16">📄</text>
    <text x="394" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ffd93d" font-weight="600">RESUME ATS</text>
  </g>

  <g class="feat-float ff5">
    <rect x="454" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#ff6b6b" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="1.6s"/>
    </rect>
    <text x="502" y="40" text-anchor="middle" font-size="16">🗺️</text>
    <text x="502" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#ff6b6b" font-weight="600">ROADMAP</text>
  </g>

  <g class="feat-float ff6">
    <rect x="562" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#00d2ff" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <text x="610" y="40" text-anchor="middle" font-size="16">📊</text>
    <text x="610" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#00d2ff" font-weight="600">DASHBOARD</text>
  </g>

  <g class="feat-float ff7">
    <rect x="670" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#7b2ff7" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2.4s"/>
    </rect>
    <text x="718" y="40" text-anchor="middle" font-size="16">💎</text>
    <text x="718" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#7b2ff7" font-weight="600">PREMIUM</text>
  </g>

  <g class="feat-float ff8">
    <rect x="778" y="18" width="95" height="60" rx="10" fill="#0f172a" stroke="#64ffda" stroke-width="1">
      <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" begin="2.8s"/>
    </rect>
    <text x="826" y="40" text-anchor="middle" font-size="16">⚙️</text>
    <text x="826" y="60" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#64ffda" font-weight="600">SETTINGS</text>
  </g>

  <!-- Bottom row: pipeline flow -->
  <g transform="translate(0, 90)">
    <!-- Flow arrows -->
    <text x="22" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#8892b0">user</text>
    <line x1="52" y1="26" x2="82" y2="26" stroke="#00d2ff" stroke-width="1" marker-end="none">
      <animate attributeName="stroke-opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
    </line>
    <text x="62" y="22" font-size="10" fill="#00d2ff">→</text>

    <text x="82" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00d2ff">auth</text>
    <text x="118" y="22" font-size="10" fill="#7b2ff7">→</text>

    <text x="135" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7b2ff7">configure</text>
    <text x="203" y="22" font-size="10" fill="#64ffda">→</text>

    <text x="218" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64ffda">company?</text>
    <text x="290" y="22" font-size="10" fill="#ffd93d">→</text>

    <text x="305" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffd93d">interview</text>
    <text x="375" y="22" font-size="10" fill="#ff6b6b">→</text>

    <text x="390" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ff6b6b">gemini_ai</text>
    <text x="465" y="22" font-size="10" fill="#00d2ff">→</text>

    <text x="478" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#00d2ff">evaluate</text>
    <text x="545" y="22" font-size="10" fill="#7b2ff7">→</text>

    <text x="558" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#7b2ff7">score</text>
    <text x="598" y="22" font-size="10" fill="#64ffda">→</text>

    <text x="612" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#64ffda">report</text>
    <text x="660" y="22" font-size="10" fill="#ffd93d">→</text>

    <text x="675" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ffd93d">roadmap</text>
    <text x="738" y="22" font-size="10" fill="#ff6b6b">→</text>

    <text x="750" y="30" font-family="'JetBrains Mono', monospace" font-size="10" fill="#ff6b6b" font-weight="700">hired! 🚀</text>

    <!-- Animated progress bar under the pipeline -->
    <rect x="22" y="44" width="850" height="3" rx="1.5" fill="#1e293b"/>
    <rect x="22" y="44" width="0" height="3" rx="1.5" fill="#00d2ff">
      <animate attributeName="width" values="0;850" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill" values="#00d2ff;#7b2ff7;#64ffda;#ffd93d;#ff6b6b;#00d2ff" dur="4s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
