<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="1200" height="140">
  <defs>
    <linearGradient id="featGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2ff7"/>
      <stop offset="50%" stop-color="#00d2ff"/>
      <stop offset="100%" stop-color="#64ffda"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="140" fill="#050816" rx="12"/>

  <!-- Feature cards -->
  <g transform="translate(10, 15)">
    <!-- Card 1: AI Interview -->
    <rect x="0" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#7b2ff7" stroke-width="1"/>
    <circle cx="74" cy="35" r="8" fill="#7b2ff7"/>
    <text x="74" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#a78bfa" font-weight="bold">AI Interview</text>
    <text x="74" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">30+ Roles · 6 Types</text>
    <text x="74" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Real-time Scoring</text>

    <!-- Card 2: ATS Resume -->
    <rect x="158" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#00d2ff" stroke-width="1"/>
    <circle cx="232" cy="35" r="8" fill="#00d2ff"/>
    <text x="232" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#67e8f9" font-weight="bold">ATS Resume</text>
    <text x="232" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">PDF Upload · Score</text>
    <text x="232" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Skill Gap Analysis</text>

    <!-- Card 3: Voice AI -->
    <rect x="316" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#ff6b6b" stroke-width="1"/>
    <circle cx="390" cy="35" r="8" fill="#ff6b6b"/>
    <text x="390" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fca5a5" font-weight="bold">Voice AI Mock</text>
    <text x="390" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Speech-to-Text</text>
    <text x="390" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Confidence Score</text>

    <!-- Card 4: LeetCode Arena -->
    <rect x="474" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#ffd93d" stroke-width="1"/>
    <circle cx="548" cy="35" r="8" fill="#ffd93d"/>
    <text x="548" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fde68a" font-weight="bold">500+ LeetCode</text>
    <text x="548" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">4 Languages</text>
    <text x="548" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Live Code Sandbox</text>

    <!-- Card 5: System Design -->
    <rect x="632" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#64ffda" stroke-width="1"/>
    <circle cx="706" cy="35" r="8" fill="#64ffda"/>
    <text x="706" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#6ee7b7" font-weight="bold">System Design</text>
    <text x="706" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Architecture Canvas</text>
    <text x="706" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">AI Review</text>

    <!-- Card 6: Career Roadmap -->
    <rect x="790" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="864" cy="35" r="8" fill="#a78bfa"/>
    <text x="864" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#c4b5fd" font-weight="bold">Career Roadmap</text>
    <text x="864" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Weekly Plans</text>
    <text x="864" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Progress Tracking</text>

    <!-- Card 7: FAANG Prep -->
    <rect x="948" y="0" width="148" height="110" rx="10" fill="#0f172a" stroke="#ffd93d" stroke-width="1"/>
    <circle cx="1022" cy="35" r="8" fill="#ffd93d"/>
    <text x="1022" y="60" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#fde68a" font-weight="bold">FAANG Prep</text>
    <text x="1022" y="77" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">12 Companies</text>
    <text x="1022" y="94" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#64748b">Premium Tier</text>
