<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="tg">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <style>
    @keyframes techPulse { 0%,100% { transform: scale(1); opacity: 0.85; } 50% { transform: scale(1.05); opacity: 1; } }
    @keyframes orbit { 0% { stroke-dashoffset: 440; } 100% { stroke-dashoffset: 0; } }
    @keyframes connectGlow { 0%,100% { stroke-opacity: 0.15; } 50% { stroke-opacity: 0.5; } }
    .tech { animation: techPulse 3s ease-in-out infinite; transform-origin: center; }
    .t1 { animation-delay: 0s; }
    .t2 { animation-delay: 0.3s; }
    .t3 { animation-delay: 0.6s; }
    .t4 { animation-delay: 0.9s; }
    .t5 { animation-delay: 1.2s; }
    .t6 { animation-delay: 1.5s; }
    .t7 { animation-delay: 1.8s; }
    .t8 { animation-delay: 2.1s; }
    .t9 { animation-delay: 2.4s; }
    .t10 { animation-delay: 2.7s; }
    .conn { animation: connectGlow 4s ease-in-out infinite; }
  </style>

  <rect width="900" height="180" fill="url(#tbg)" rx="12"/>

  <!-- Connection lines between tech nodes -->
  <g class="conn">
    <!-- Frontend connections -->
    <line x1="90" y1="60" x2="190" y2="60" stroke="#00d2ff" stroke-width="0.5"/>
    <line x1="190" y1="60" x2="290" y2="60" stroke="#00d2ff" stroke-width="0.5"/>
    <line x1="290" y1="60" x2="390" y2="60" stroke="#00d2ff" stroke-width="0.5"/>
    <!-- Backend connections -->
    <line x1="510" y1="60" x2="610" y2="60" stroke="#7b2ff7" stroke-width="0.5"/>
    <line x1="610" y1="60" x2="710" y2="60" stroke="#7b2ff7" stroke-width="0.5"/>
    <line x1="710" y1="60" x2="810" y2="60" stroke="#7b2ff7" stroke-width="0.5"/>
    <!-- Cross connections -->
    <line x1="390" y1="60" x2="510" y2="60" stroke="#64ffda" stroke-width="0.5" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" values="8;0" dur="1s" repeatCount="indefinite"/>
    </line>
    <!-- Bottom connections -->
    <line x1="248" y1="80" x2="248" y2="140" stroke="#ffd93d" stroke-width="0.5" opacity="0.3"/>
    <line x1="660" y1="80" x2="660" y2="140" stroke="#ff6b6b" stroke-width="0.3" opacity="0.3"/>
  </g>

  <!-- Label: FRONTEND -->
  <text x="240" y="25" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#00d2ff" letter-spacing="3" font-weight="600" opacity="0.7">F R O N T E N D</text>

  <!-- Label: BACKEND -->
  <text x="660" y="25" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="9" fill="#7b2ff7" letter-spacing="3" font-weight="600" opacity="0.7">B A C K E N D</text>

  <!-- Frontend Tech Nodes -->
  <g class="tech t1" transform="translate(90, 60)">
    <circle r="22" fill="#0f172a" stroke="#00d2ff" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">Next.js</text>
  </g>

  <g class="tech t2" transform="translate(190, 60)">
    <circle r="22" fill="#0f172a" stroke="#00d2ff" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">React</text>
  </g>

  <g class="tech t3" transform="translate(290, 60)">
    <circle r="22" fill="#0f172a" stroke="#00d2ff" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">TS</text>
  </g>

  <g class="tech t4" transform="translate(390, 60)">
    <circle r="22" fill="#0f172a" stroke="#00d2ff" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">Tailwind</text>
  </g>

  <!-- Backend Tech Nodes -->
  <g class="tech t5" transform="translate(510, 60)">
    <circle r="22" fill="#0f172a" stroke="#7b2ff7" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">Spring</text>
  </g>

  <g class="tech t6" transform="translate(610, 60)">
    <circle r="22" fill="#0f172a" stroke="#7b2ff7" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">Java</text>
  </g>

  <g class="tech t7" transform="translate(710, 60)">
    <circle r="22" fill="#0f172a" stroke="#7b2ff7" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">JWT</text>
  </g>

  <g class="tech t8" transform="translate(810, 60)">
    <circle r="22" fill="#0f172a" stroke="#7b2ff7" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#e2e8f0" font-weight="600">Maven</text>
  </g>

  <!-- Bottom Row -->
  <!-- Data -->
  <g class="tech t9" transform="translate(248, 140)">
    <rect x="-40" y="-18" width="80" height="36" rx="10" fill="#0f172a" stroke="#ffd93d" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ffd93d" font-weight="600">🐘 PostgreSQL</text>
  </g>

  <!-- AI -->
  <g class="tech t10" transform="translate(660, 140)">
    <rect x="-55" y="-18" width="110" height="36" rx="10" fill="#0f172a" stroke="#ff6b6b" stroke-width="1.5"/>
    <text y="5" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#ff6b6b" font-weight="600">✨ Gemini 2.5 Flash</text>
  </g>

  <!-- Label: ZUSTAND -->
  <g class="tech t1" transform="translate(450, 120)">
    <rect x="-28" y="-12" width="56" height="24" rx="8" fill="#0f172a" stroke="#64ffda" stroke-width="1"/>
    <text y="4" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="7" fill="#64ffda" font-weight="600">Zustand</text>
  </g>
</svg>
