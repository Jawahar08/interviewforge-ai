<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 240" width="1000" height="240">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="50%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#050816"/>
    </linearGradient>

    <!-- Border Gradient -->
    <linearGradient id="borderGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="33%" stop-color="#7b2ff7"/>
      <stop offset="66%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ffd93d"/>
    </linearGradient>

    <!-- Category Pill Gradients -->
    <linearGradient id="frontendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="backendGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2ff7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="aiGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0.25"/>
    </linearGradient>

    <linearGradient id="devopsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#64ffda" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- Container Box -->
  <rect width="1000" height="240" fill="url(#cardBg)" rx="16" stroke="#1e293b" stroke-width="1.5"/>
  <rect x="2" y="2" width="996" height="236" fill="none" rx="14" stroke="url(#borderGlow)" stroke-width="1" opacity="0.4"/>

  <!-- ================= SECTION 1: FRONTEND ================= -->
  <g transform="translate(30, 25)">
    <!-- Header Badge -->
    <rect x="0" y="0" width="210" height="28" rx="8" fill="url(#frontendGrad)" stroke="#00d2ff" stroke-width="1"/>
    <text x="105" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#38bdf8" letter-spacing="1.5">FRONTEND TIER</text>

    <!-- Tech Pills -->
    <g transform="translate(0, 45)">
      <!-- Next.js 16 -->
      <rect x="0" y="0" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="16" r="5" fill="#ffffff"/>
      <text x="56" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">Next.js 16</text>

      <!-- React 19 -->
      <rect x="110" y="0" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="16" r="5" fill="#61dafb"/>
      <text x="166" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">React 19</text>

      <!-- TypeScript -->
      <rect x="0" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <rect x="11" y="53" width="10" height="10" rx="2" fill="#3178c6"/>
      <text x="56" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">TypeScript</text>

      <!-- Tailwind CSS -->
      <rect x="110" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="58" r="5" fill="#38bdf8"/>
      <text x="166" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">Tailwind</text>

      <!-- Zustand -->
      <rect x="0" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="100" r="5" fill="#a78bfa"/>
      <text x="56" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">Zustand</text>

      <!-- Lucide Icons -->
      <rect x="110" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="100" r="5" fill="#f43f5e"/>
      <text x="166" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f43f5e">Lucide</text>
    </g>
  </g>

  <!-- ================= SECTION 2: BACKEND ================= -->
  <g transform="translate(275, 25)">
    <!-- Header Badge -->
    <rect x="0" y="0" width="210" height="28" rx="8" fill="url(#backendGrad)" stroke="#7b2ff7" stroke-width="1"/>
    <text x="105" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#c084fc" letter-spacing="1.5">BACKEND TIER</text>

    <!-- Tech Pills -->
    <g transform="translate(0, 45)">
      <!-- Java 23 -->
      <rect x="0" y="0" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="16" r="5" fill="#f97316"/>
      <text x="56" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">Java 23</text>

      <!-- Spring Boot 3 -->
      <rect x="110" y="0" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="16" r="5" fill="#22c55e"/>
      <text x="166" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f8fafc">Spring Boot</text>

      <!-- Spring Security -->
      <rect x="0" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="58" r="5" fill="#60a5fa"/>
      <text x="56" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">Security</text>

      <!-- JWT Auth -->
      <rect x="110" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="58" r="5" fill="#fbbf24"/>
      <text x="166" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fbbf24">JWT Auth</text>

      <!-- Hibernate / JPA -->
      <rect x="0" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="100" r="5" fill="#cbd5e1"/>
      <text x="56" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#cbd5e1">Hibernate</text>

      <!-- Maven -->
      <rect x="110" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="100" r="5" fill="#e2e8f0"/>
      <text x="166" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#e2e8f0">Maven</text>
    </g>
  </g>

  <!-- ================= SECTION 3: AI & DATA ================= -->
  <g transform="translate(520, 25)">
    <!-- Header Badge -->
    <rect x="0" y="0" width="210" height="28" rx="8" fill="url(#aiGrad)" stroke="#ff6b6b" stroke-width="1"/>
    <text x="105" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#fca5a5" letter-spacing="1.5">AI &amp; DATA TIER</text>

    <!-- Tech Pills -->
    <g transform="translate(0, 45)">
      <!-- Gemini 2.5 Flash -->
      <rect x="0" y="0" width="208" height="32" rx="8" fill="#0f172a" stroke="#ff6b6b" stroke-width="1"/>
      <circle cx="20" cy="16" r="5" fill="#fda4af"/>
      <text x="114" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fda4af">Gemini 2.5 Flash Engine</text>

      <!-- PostgreSQL -->
      <rect x="0" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="58" r="5" fill="#38bdf8"/>
      <text x="56" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#38bdf8">PostgreSQL</text>

      <!-- Apache PDFBox -->
      <rect x="110" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="58" r="5" fill="#f43f5e"/>
      <text x="166" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f43f5e">PDFBox</text>

      <!-- Web Speech API -->
      <rect x="0" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="100" r="5" fill="#34d399"/>
      <text x="56" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#34d399">Speech API</text>

      <!-- Swagger / OpenAPI -->
      <rect x="110" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="126" cy="100" r="5" fill="#a7f3d0"/>
      <text x="166" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#a7f3d0">Swagger</text>
    </g>
  </g>

  <!-- ================= SECTION 4: DEVOPS & INFRA ================= -->
  <g transform="translate(765, 25)">
    <!-- Header Badge -->
    <rect x="0" y="0" width="205" height="28" rx="8" fill="url(#devopsGrad)" stroke="#64ffda" stroke-width="1"/>
    <text x="102" y="18" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="bold" fill="#6ee7b7" letter-spacing="1.5">DEVOPS &amp; CI/CD</text>

    <!-- Tech Pills -->
    <g transform="translate(0, 45)">
      <!-- GitHub Actions -->
      <rect x="0" y="0" width="205" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="20" cy="16" r="5" fill="#60a5fa"/>
      <text x="112" y="20" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#60a5fa">GitHub Actions CI/CD</text>

      <!-- Docker -->
      <rect x="0" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="58" r="5" fill="#38bdf8"/>
      <text x="56" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#38bdf8">Docker</text>

      <!-- Turbopack -->
      <rect x="107" y="42" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="123" cy="58" r="5" fill="#fb7185"/>
      <text x="156" y="62" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#fb7185">Turbopack</text>

      <!-- Flyway -->
      <rect x="0" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="16" cy="100" r="5" fill="#f97316"/>
      <text x="56" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#f97316">Flyway</text>

      <!-- BCrypt -->
      <rect x="107" y="84" width="98" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
      <circle cx="123" cy="100" r="5" fill="#a78bfa"/>
      <text x="156" y="104" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="bold" fill="#a78bfa">BCrypt</text>
    </g>
  </g>
</svg>
