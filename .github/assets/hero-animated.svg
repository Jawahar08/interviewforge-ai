<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Aurora gradient -->
    <linearGradient id="aurora" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7b2ff7">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#64ffda;#ff6b6b;#ffd93d;#7b2ff7" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#00d2ff">
        <animate attributeName="stop-color" values="#00d2ff;#64ffda;#ff6b6b;#ffd93d;#7b2ff7;#00d2ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#64ffda">
        <animate attributeName="stop-color" values="#64ffda;#ff6b6b;#ffd93d;#7b2ff7;#00d2ff;#64ffda" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Particle gradient -->
    <radialGradient id="particle" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7b2ff7" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="400" fill="#050816" rx="16"/>

  <!-- Animated aurora blobs -->
  <ellipse cx="200" cy="200" rx="300" ry="150" fill="#7b2ff7" opacity="0.06" filter="url(#softGlow)">
    <animate attributeName="cx" values="200;400;200" dur="12s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="900" cy="180" rx="250" ry="120" fill="#00d2ff" opacity="0.06" filter="url(#softGlow)">
    <animate attributeName="cx" values="900;700;900" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.06;0.1;0.06" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="600" cy="350" rx="200" ry="100" fill="#64ffda" opacity="0.04" filter="url(#softGlow)">
    <animate attributeName="cy" values="350;300;350" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating particles -->
  <circle cx="100" cy="80" r="2" fill="url(#particle)"><animate attributeName="cy" values="80;40;80" dur="4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;1;0.3" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="300" cy="60" r="1.5" fill="url(#particle)"><animate attributeName="cy" values="60;20;60" dur="5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.2;0.8;0.2" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="500" cy="50" r="2" fill="url(#particle)"><animate attributeName="cy" values="50;10;50" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="700" cy="70" r="1.5" fill="url(#particle)"><animate attributeName="cy" values="70;30;70" dur="4.5s" repeatCount="indefinite"/></circle>
  <circle cx="900" cy="55" r="2.5" fill="url(#particle)"><animate attributeName="cy" values="55;15;55" dur="6s" repeatCount="indefinite"/></circle>
  <circle cx="1100" cy="45" r="1.5" fill="url(#particle)"><animate attributeName="cy" values="45;5;45" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="150" cy="350" r="1.5" fill="url(#particle)"><animate attributeName="cy" values="350;310;350" dur="5s" repeatCount="indefinite"/></circle>
  <circle cx="400" cy="370" r="2" fill="url(#particle)"><animate attributeName="cy" values="370;330;370" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="800" cy="360" r="1.5" fill="url(#particle)"><animate attributeName="cy" values="360;320;360" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="1050" cy="340" r="2" fill="url(#particle)"><animate attributeName="cy" values="340;300;340" dur="4.5s" repeatCount="indefinite"/></circle>

  <!-- Grid lines (subtle) -->
  <g stroke="#1e293b" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/><line x1="400" y1="0" x2="400" y2="400"/><line x1="600" y1="0" x2="600" y2="400"/><line x1="800" y1="0" x2="800" y2="400"/><line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Logo/Icon -->
  <g transform="translate(600, 105)" filter="url(#glow)">
    <text text-anchor="middle" font-size="52" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif" fill="#fff">⚡</text>
  </g>

  <!-- Main Title -->
  <text x="600" y="190" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="50" font-weight="900" fill="url(#aurora)" filter="url(#glow)" letter-spacing="-1.5">
    InterviewForge AI
  </text>

  <!-- Subtitle -->
  <text x="600" y="230" text-anchor="middle" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="16" fill="#94a3b8" font-weight="500" letter-spacing="3">
    NEXT-GEN AI INTERVIEW SIMULATION PLATFORM
  </text>

  <!-- Feature pills row -->
  <g transform="translate(600, 275)">
    <!-- AI Interviews -->
    <rect x="-520" y="-14" width="130" height="28" rx="14" fill="#7b2ff7" opacity="0.2" stroke="#7b2ff7" stroke-width="1"/>
    <text x="-455" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="600">🎙️ AI Interviews</text>

    <!-- ATS Resume -->
    <rect x="-370" y="-14" width="120" height="28" rx="14" fill="#00d2ff" opacity="0.2" stroke="#00d2ff" stroke-width="1"/>
    <text x="-310" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#67e8f9" font-weight="600">📄 ATS Resume</text>

    <!-- Voice AI -->
    <rect x="-230" y="-14" width="105" height="28" rx="14" fill="#ff6b6b" opacity="0.2" stroke="#ff6b6b" stroke-width="1"/>
    <text x="-178" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#fca5a5" font-weight="600">🎤 Voice AI</text>

    <!-- 500+ LeetCode -->
    <rect x="-105" y="-14" width="130" height="28" rx="14" fill="#ffd93d" opacity="0.2" stroke="#ffd93d" stroke-width="1"/>
    <text x="-40" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#fde68a" font-weight="600">💻 500+ LeetCode</text>

    <!-- System Design -->
    <rect x="45" y="-14" width="140" height="28" rx="14" fill="#64ffda" opacity="0.2" stroke="#64ffda" stroke-width="1"/>
    <text x="115" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#6ee7b7" font-weight="600">🏗️ System Design</text>

    <!-- Career Roadmap -->
    <rect x="205" y="-14" width="140" height="28" rx="14" fill="#7b2ff7" opacity="0.2" stroke="#7b2ff7" stroke-width="1"/>
    <text x="275" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#a78bfa" font-weight="600">🗺️ Career Roadmap</text>

    <!-- FAANG Prep -->
    <rect x="365" y="-14" width="130" height="28" rx="14" fill="#ff6b6b" opacity="0.2" stroke="#ff6b6b" stroke-width="1"/>
    <text x="430" y="5" text-anchor="middle" font-family="'Inter', system-ui, sans-serif" font-size="11" fill="#fca5a5" font-weight="600">💎 FAANG Prep</text>
  </g>

  <!-- Terminal prompt animation -->
  <g transform="translate(600, 340)">
    <rect x="-250" y="-14" width="500" height="32" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1"/>
    <text x="-235" y="6" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#64ffda">$</text>
    <text x="-220" y="6" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="13" fill="#94a3b8">
      npx interviewforge start --ai gemini --mode pro
      <animate attributeName="opacity" values="1;0.5;1" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>
</svg>
