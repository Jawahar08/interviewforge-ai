<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <defs>
    <!-- Animated gradient backgrounds -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a">
        <animate attributeName="stop-color" values="#0a0a1a;#0d0f25;#0a0a1a" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#1a0533">
        <animate attributeName="stop-color" values="#1a0533;#0f172a;#1a0533" dur="5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a">
        <animate attributeName="stop-color" values="#0a0a1a;#0d1117;#0a0a1a" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Neon glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-big" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-text" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Animated aurora gradient -->
    <linearGradient id="aurora" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2ff7;stop-opacity:0.6">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#64ffda;#7b2ff7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="33%" style="stop-color:#00d2ff;stop-opacity:0.4">
        <animate attributeName="stop-color" values="#00d2ff;#64ffda;#7b2ff7;#00d2ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="66%" style="stop-color:#64ffda;stop-opacity:0.5">
        <animate attributeName="stop-color" values="#64ffda;#7b2ff7;#00d2ff;#64ffda" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.3">
        <animate attributeName="stop-color" values="#ff6b6b;#7b2ff7;#ffd93d;#ff6b6b" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Radial glow -->
    <radialGradient id="center-glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#7b2ff7;stop-opacity:0.3">
        <animate attributeName="stop-opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </radialGradient>

    <!-- Title gradient -->
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="30%" style="stop-color:#00d2ff">
        <animate attributeName="stop-color" values="#00d2ff;#7b2ff7;#00d2ff" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="70%" style="stop-color:#7b2ff7">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#7b2ff7" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>

    <!-- Bolt gradient -->
    <linearGradient id="bolt-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd93d"/>
      <stop offset="50%" style="stop-color:#ff6b6b">
        <animate attributeName="stop-color" values="#ff6b6b;#ffd93d;#ff6b6b" dur="2s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#ffd93d"/>
    </linearGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00d2ff;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#00d2ff;stop-opacity:0"/>
    </linearGradient>

    <!-- Underline shimmer -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff;stop-opacity:0">
        <animate attributeName="offset" values="-0.5;1.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="20%" style="stop-color:#7b2ff7;stop-opacity:1">
        <animate attributeName="offset" values="-0.3;1.7" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="40%" style="stop-color:#00d2ff;stop-opacity:1">
        <animate attributeName="offset" values="-0.1;1.9" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" style="stop-color:#00d2ff;stop-opacity:0">
        <animate attributeName="offset" values="0.1;2.1" dur="3s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <style>
    @keyframes float1 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-12px); } }
    @keyframes float2 { 0%,100% { transform: translateY(0px); } 50% { transform: translateY(-8px); } }
    @keyframes float3 { 0%,100% { transform: translateY(-5px); } 50% { transform: translateY(5px); } }
    @keyframes pulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.9; } }
    @keyframes pulse2 { 0%,100% { opacity: 0.2; } 50% { opacity: 0.7; } }
    @keyframes twinkle { 0%,100% { opacity: 0; r: 1; } 50% { opacity: 1; r: 2; } }
    @keyframes twinkle2 { 0%,100% { opacity: 0.1; } 30% { opacity: 0.8; } 70% { opacity: 0.2; } }
    @keyframes orbit { 0% { transform: rotate(0deg) translateX(30px) rotate(0deg); } 100% { transform: rotate(360deg) translateX(30px) rotate(-360deg); } }
    @keyframes scanmove { 0% { transform: translateY(-100px); } 100% { transform: translateY(500px); } }
    @keyframes dash { 0% { stroke-dashoffset: 300; } 100% { stroke-dashoffset: 0; } }
    @keyframes boltpulse { 0%,100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.1); } }
    @keyframes ringpulse { 0% { r: 60; opacity: 0.3; } 50% { r: 70; opacity: 0.1; } 100% { r: 60; opacity: 0.3; } }
    @keyframes fadeSlide { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes glowpulse { 0%,100% { filter: drop-shadow(0 0 8px #00d2ff); } 50% { filter: drop-shadow(0 0 20px #7b2ff7); } }
    .particle { animation: pulse 3s ease-in-out infinite; }
    .p1 { animation: twinkle 4s ease-in-out infinite; }
    .p2 { animation: twinkle 3s ease-in-out infinite 0.5s; }
    .p3 { animation: twinkle 5s ease-in-out infinite 1s; }
    .p4 { animation: twinkle2 3.5s ease-in-out infinite 0.3s; }
    .p5 { animation: twinkle 4.5s ease-in-out infinite 1.5s; }
    .p6 { animation: twinkle2 3s ease-in-out infinite 2s; }
    .p7 { animation: twinkle 5.5s ease-in-out infinite 0.8s; }
    .p8 { animation: twinkle2 4s ease-in-out infinite 1.2s; }
    .float1 { animation: float1 6s ease-in-out infinite; }
    .float2 { animation: float2 5s ease-in-out infinite 0.5s; }
    .float3 { animation: float3 7s ease-in-out infinite 1s; }
    .scanline { animation: scanmove 4s linear infinite; }
    .bolt { animation: boltpulse 2s ease-in-out infinite; }
    .ring { animation: ringpulse 3s ease-in-out infinite; }
    .glow-anim { animation: glowpulse 3s ease-in-out infinite; }
  </style>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg-grad)" rx="12"/>

  <!-- Aurora band -->
  <ellipse cx="450" cy="160" rx="400" ry="80" fill="url(#aurora)" opacity="0.4">
    <animate attributeName="ry" values="80;100;80" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="5s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Center glow -->
  <rect width="900" height="400" fill="url(#center-glow)" rx="12"/>

  <!-- Scan line effect -->
  <rect class="scanline" x="0" y="0" width="900" height="100" fill="url(#scanline)" opacity="0.5"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.04" stroke="#00d2ff">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="320" x2="900" y2="320"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="450" y1="0" x2="450" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="750" y1="0" x2="750" y2="400"/>
  </g>

  <!-- Floating particles -->
  <circle class="p1" cx="80" cy="60" r="1.5" fill="#00d2ff"/>
  <circle class="p2" cx="180" cy="90" r="1" fill="#7b2ff7"/>
  <circle class="p3" cx="320" cy="40" r="1.5" fill="#64ffda"/>
  <circle class="p4" cx="520" cy="70" r="1" fill="#ff6b6b"/>
  <circle class="p5" cx="680" cy="50" r="1.5" fill="#ffd93d"/>
  <circle class="p6" cx="800" cy="80" r="1" fill="#00d2ff"/>
  <circle class="p7" cx="120" cy="340" r="1.5" fill="#7b2ff7"/>
  <circle class="p8" cx="750" cy="320" r="1" fill="#64ffda"/>
  <circle class="p1" cx="400" cy="360" r="1.5" fill="#ff6b6b"/>
  <circle class="p3" cx="600" cy="350" r="1" fill="#ffd93d"/>
  <circle class="p5" cx="250" cy="300" r="1.5" fill="#00d2ff"/>
  <circle class="p2" cx="650" cy="290" r="1" fill="#7b2ff7"/>
  <circle class="p4" cx="50" cy="200" r="1" fill="#64ffda"/>
  <circle class="p6" cx="850" cy="190" r="1.5" fill="#ff6b6b"/>
  <circle class="p7" cx="160" cy="150" r="1" fill="#ffd93d"/>
  <circle class="p8" cx="780" cy="140" r="1.5" fill="#00d2ff"/>
  <circle class="p1" cx="350" cy="320" r="1" fill="#7b2ff7"/>
  <circle class="p3" cx="550" cy="100" r="1.5" fill="#64ffda"/>
  <circle class="p5" cx="420" cy="280" r="1" fill="#00d2ff"/>
  <circle class="p2" cx="700" cy="370" r="1.5" fill="#ffd93d"/>
  <!-- Extra particles for density -->
  <circle class="p4" cx="30" cy="130" r="0.8" fill="#00d2ff"/>
  <circle class="p6" cx="870" cy="260" r="0.8" fill="#7b2ff7"/>
  <circle class="p8" cx="500" cy="30" r="0.8" fill="#64ffda"/>
  <circle class="p1" cx="200" cy="370" r="0.8" fill="#ff6b6b"/>

  <!-- Decorative orbiting ring around bolt -->
  <circle class="ring" cx="310" cy="120" r="60" fill="none" stroke="#7b2ff7" stroke-width="0.5" opacity="0.3"/>

  <!-- Lightning bolt icon -->
  <g class="bolt float1" transform="translate(290, 85)">
    <polygon points="20,0 8,25 22,25 5,50 40,20 25,20 38,0" fill="url(#bolt-grad)" filter="url(#glow-cyan)"/>
  </g>

  <!-- Main title -->
  <text x="450" y="135" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="800" fill="url(#title-grad)" filter="url(#glow-text)" letter-spacing="2">
    InterviewForge AI
  </text>

  <!-- Animated underline -->
  <line x1="200" y1="155" x2="700" y2="155" stroke="url(#shimmer)" stroke-width="2" stroke-linecap="round"/>

  <!-- Subtitle -->
  <text x="450" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8892b0" letter-spacing="3">
    NEXT-GEN AI INTERVIEW SIMULATION PLATFORM
  </text>

  <!-- Feature pills row -->
  <g class="float2" transform="translate(0, 10)">
    <!-- Pill 1: AI Interview -->
    <rect x="95" y="210" width="130" height="32" rx="16" fill="#0f172a" stroke="#00d2ff" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="160" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#00d2ff" font-weight="600">🎙️ AI Interviews</text>

    <!-- Pill 2: Resume ATS -->
    <rect x="240" y="210" width="130" height="32" rx="16" fill="#0f172a" stroke="#7b2ff7" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <text x="305" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#7b2ff7" font-weight="600">📄 Resume ATS</text>

    <!-- Pill 3: Career Roadmap -->
    <rect x="385" y="210" width="130" height="32" rx="16" fill="#0f172a" stroke="#64ffda" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="450" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#64ffda" font-weight="600">🗺️ Career Roadmap</text>

    <!-- Pill 4: Company Prep -->
    <rect x="530" y="210" width="130" height="32" rx="16" fill="#0f172a" stroke="#ffd93d" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="1.5s"/>
    </rect>
    <text x="595" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ffd93d" font-weight="600">💎 Company Prep</text>

    <!-- Pill 5: AI Scoring -->
    <rect x="675" y="210" width="130" height="32" rx="16" fill="#0f172a" stroke="#ff6b6b" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite" begin="2s"/>
    </rect>
    <text x="740" y="231" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#ff6b6b" font-weight="600">🧠 AI Scoring</text>
  </g>

  <!-- Terminal window -->
  <g class="float3">
    <rect x="170" y="272" width="560" height="105" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.5" opacity="0.95"/>
    <!-- Terminal header bar -->
    <rect x="170" y="272" width="560" height="24" rx="8" fill="#1e293b"/>
    <rect x="170" y="288" width="560" height="8" fill="#1e293b"/>
    <circle cx="188" cy="284" r="5" fill="#ff5f56"/>
    <circle cx="204" cy="284" r="5" fill="#ffbd2e"/>
    <circle cx="220" cy="284" r="5" fill="#27c93f"/>
    <text x="450" y="288" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="9" fill="#8892b0">interviewforge — zsh</text>

    <!-- Terminal line 1 -->
    <text x="190" y="315" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#64ffda">$</text>
    <text x="205" y="315" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#ccd6f6">
      interviewforge --company google --role sde
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="0.5s"/>
    </text>

    <!-- Terminal line 2 -->
    <text x="190" y="338" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#7b2ff7">
      ✨ Generating 5 Google-tailored questions...
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="1.5s"/>
    </text>
    <text x="635" y="338" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#64ffda" font-weight="700">
      done
      <animate attributeName="opacity" values="0;1" dur="0.3s" fill="freeze" begin="2.5s"/>
    </text>

    <!-- Terminal line 3 -->
    <text x="190" y="361" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="12" fill="#00d2ff">
      📊 Score: 9.2/10 | Ready to get hired 🚀
      <animate attributeName="opacity" values="0;1" dur="0.5s" fill="freeze" begin="3s"/>
    </text>

    <!-- Blinking cursor -->
    <rect x="580" y="352" width="8" height="14" fill="#00d2ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Bottom decorative line -->
  <line x1="50" y1="392" x2="850" y2="392" stroke="url(#aurora)" stroke-width="1" opacity="0.4"/>

  <!-- Corner decorations -->
  <path d="M20,20 L20,50 M20,20 L50,20" stroke="#00d2ff" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M880,20 L880,50 M880,20 L850,20" stroke="#7b2ff7" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="0.5s"/>
  </path>
  <path d="M20,380 L20,350 M20,380 L50,380" stroke="#64ffda" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="1s"/>
  </path>
  <path d="M880,380 L880,350 M880,380 L850,380" stroke="#ffd93d" stroke-width="1" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  </path>
</svg>
