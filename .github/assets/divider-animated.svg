<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 3" width="900" height="3">
  <defs>
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#7b2ff7;stop-opacity:1">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#ff6b6b;#7b2ff7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" style="stop-color:#00d2ff;stop-opacity:1">
        <animate attributeName="stop-color" values="#00d2ff;#64ffda;#ffd93d;#00d2ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="85%" style="stop-color:#64ffda;stop-opacity:1">
        <animate attributeName="stop-color" values="#64ffda;#ff6b6b;#7b2ff7;#64ffda" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" style="stop-color:#0a0a1a;stop-opacity:0"/>
    </linearGradient>
    <filter id="dg">
      <feGaussianBlur stdDeviation="0.5"/>
    </filter>
  </defs>
  <rect width="900" height="3" fill="url(#div-grad)" filter="url(#dg)" rx="1.5"/>
</svg>
