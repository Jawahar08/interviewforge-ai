<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="1200" height="100">
  <defs>
    <linearGradient id="statsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b2ff7">
        <animate attributeName="stop-color" values="#7b2ff7;#00d2ff;#64ffda;#7b2ff7" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="25%" stop-color="#00d2ff">
        <animate attributeName="stop-color" values="#00d2ff;#64ffda;#ff6b6b;#00d2ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#64ffda">
        <animate attributeName="stop-color" values="#64ffda;#ff6b6b;#ffd93d;#64ffda" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="75%" stop-color="#ff6b6b">
        <animate attributeName="stop-color" values="#ff6b6b;#ffd93d;#7b2ff7;#ff6b6b" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ffd93d">
        <animate attributeName="stop-color" values="#ffd93d;#7b2ff7;#00d2ff;#ffd93d" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="statGlow"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="1200" height="100" fill="#050816" rx="12"/>
  <rect x="2" y="2" width="1196" height="96" fill="none" rx="10" stroke="url(#statsGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Stat 1: Domains -->
  <g transform="translate(100, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#00d2ff" filter="url(#statGlow)">30+</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">CAREER DOMAINS</text>
  </g>
  <!-- Stat 2: Interview Types -->
  <g transform="translate(280, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#7b2ff7" filter="url(#statGlow)">6</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">INTERVIEW TYPES</text>
  </g>
  <!-- Stat 3: LeetCode Problems -->
  <g transform="translate(460, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#ffd93d" filter="url(#statGlow)">500+</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">LEETCODE PROBLEMS</text>
  </g>
  <!-- Stat 4: Companies -->
  <g transform="translate(640, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#ff6b6b" filter="url(#statGlow)">12</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">FAANG COMPANIES</text>
  </g>
  <!-- Stat 5: Voice AI -->
  <g transform="translate(820, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#64ffda" filter="url(#statGlow)">AI</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">VOICE INTERVIEW</text>
  </g>
  <!-- Stat 6: AI Engine -->
  <g transform="translate(1020, 50)">
    <text text-anchor="middle" y="-8" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="900" fill="#a78bfa" filter="url(#statGlow)">Gemini</text>
    <text text-anchor="middle" y="16" font-family="'Inter', system-ui, sans-serif" font-size="10" fill="#64748b" font-weight="600" letter-spacing="2">2.5 FLASH ENGINE</text>
  </g>
</svg>
