version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: interviewforge-db
    environment:
      POSTGRES_DB: interviewforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Pandian@008
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - interviewforge-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: interviewforge-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=interviewforge
      - DB_USERNAME=postgres
      - DB_PASSWORD=Pandian@008
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SPRING_PROFILES_ACTIVE=postgres
    depends_on:
      db:
        condition: service_healthy
    networks:
      - interviewforge-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: interviewforge-frontend
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    networks:
      - interviewforge-network

volumes:
  pgdata:

networks:
  interviewforge-network:
