<!DOCTYPE html>
<html>
<head>

  <style>
    body { font-family: sans-serif; padding: 20px; background: #0f111a; color: white; }
    input { width: 300px; padding: 8px; margin-top: 8px; background: #1a1d2d; color: white; border: 1px solid #7e57c2; border-radius: 4px;}
    button { margin-top: 16px; padding: 8px 16px; background: #7e57c2; color: white; border: none; cursor: pointer; border-radius: 4px;}

<body>
  <h2>⚙️ Extension Settings</h2>

</html>
